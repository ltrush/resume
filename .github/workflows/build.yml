name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          mkdir -p dist
          mv main.pdf dist/Luke_Trusheim_Resume.pdf
          git add dist/Luke_Trusheim_Resume.pdf
          git diff --cached --quiet || git commit -m "Update compiled resume PDF [skip ci]"
          git push